name: Update Gateway Model Settings
'on':
  schedule:
  - cron: 0 16 * * 1-5
  workflow_dispatch: null
permissions:
  contents: write
  pull-requests: write
jobs:
  update-models:
    name: Update Gateway Model Settings (${{ matrix.target-branch }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository_owner == 'wdrx70xn'
    strategy:
      fail-fast: false
      matrix:
        include:
        - target-branch: main
          branch-prefix: update-gateway-models
        - target-branch: release-v6.0
          branch-prefix: update-gateway-models-v6
        - target-branch: release-v5.0
          branch-prefix: update-gateway-models-v5
    steps:
    - name: Configure Git
      run: 'git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git config --global user.name "github-actions[bot]"

        '
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: ${{ matrix.target-branch }}
        fetch-depth: 0
    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
    - name: Setup Node.js 22
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: 22
        cache: pnpm
    - name: Install Dependencies
      run: pnpm install --frozen-lockfile
    - name: Generate model settings
      id: generate-model-settings-script
      run: 'cd packages/gateway

        pnpm generate-model-settings

        '
    - name: Check for changes
      id: check-changes
      run: "if git diff --quiet packages/gateway/src/gateway-*-model-settings.ts;\
        \ then\n  echo \"has-changes=false\" >> \"$GITHUB_OUTPUT\"\n  echo \"No changes\
        \ detected in model settings\"\nelse\n  echo \"has-changes=true\" >> \"$GITHUB_OUTPUT\"\
        \n  echo \"Changes detected in model settings\"\n  git diff --stat packages/gateway/src/gateway-*-model-settings.ts\n\
        fi\n"
    - name: Create changeset
      if: steps.check-changes.outputs.has-changes == 'true'
      run: "# Generate a random changeset filename with three random lowercase strings\n\
        # Format: xxxxx-yyyyy-zzzzz.md\nWORD1=$(tr -dc 'a-z' < /dev/urandom | head\
        \ -c 5)\nWORD2=$(tr -dc 'a-z' < /dev/urandom | head -c 5)\nWORD3=$(tr -dc\
        \ 'a-z' < /dev/urandom | head -c 5)\nCHANGESET_FILE=\".changeset/${WORD1}-${WORD2}-${WORD3}.md\"\
        \n\nif [ \"${{ matrix.target-branch }}\" == \"release-v6.0\" ] || [ \"${{\
        \ matrix.target-branch }}\" == \"release-v5.0\" ]; then\n  CHANGESET_TITLE=\"\
        Backport: chore(provider/gateway): update gateway model settings files\"\n\
        else\n  CHANGESET_TITLE=\"chore(provider/gateway): update gateway model settings\
        \ files\"\nfi\n\ncat > \"$CHANGESET_FILE\" << EOF\n---\n'@ai-sdk/gateway':\
        \ patch\n---\n\n$CHANGESET_TITLE\nEOF\n\necho \"Created changeset: $CHANGESET_FILE\"\
        \ncat \"$CHANGESET_FILE\"\n"
    - name: Create branch and push as signed commit
      if: steps.check-changes.outputs.has-changes == 'true'
      id: create-branch
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
        BASE_BRANCH: ${{ matrix.target-branch }}
        BRANCH_PREFIX: ${{ matrix.branch-prefix }}
      run: "set -euo pipefail\n\nBRANCH_NAME=\"${BRANCH_PREFIX}-$(date +%Y%m%d-%H%M)\"\
        \necho \"branch-name=$BRANCH_NAME\" >> \"$GITHUB_OUTPUT\"\n\n# Stage and commit\
        \ locally so we have a HEAD to diff against the\n# base branch tip. The local\
        \ commit is never pushed; we extract\n# its file changes and submit them via\
        \ the GraphQL\n# createCommitOnBranch mutation, which produces a signed commit\n\
        # attributed to the GITHUB_TOKEN owner.\ngit add .\ngit commit -m \"chore(provider/gateway):\
        \ update gateway model settings files\"\n\nPARENT_OID=$(git rev-parse \"origin/${BASE_BRANCH}\"\
        )\nHEADLINE=$(git log -1 --format=%s HEAD)\nBODY=$(git log -1 --format=%b\
        \ HEAD)\n\nADDITIONS='[]'\nwhile IFS= read -r -d '' path; do\n  [ -z \"$path\"\
        \ ] && continue\n  CONTENT=$(base64 < \"$path\" | tr -d '\\n')\n  ADDITIONS=$(jq\
        \ -c --arg p \"$path\" --arg c \"$CONTENT\" '. + [{path: $p, contents: $c}]'\
        \ <<<\"$ADDITIONS\")\ndone < <(git diff --no-renames --name-only --diff-filter=AM\
        \ -z \"${PARENT_OID}\" HEAD)\n\nDELETIONS='[]'\nwhile IFS= read -r -d '' path;\
        \ do\n  [ -z \"$path\" ] && continue\n  DELETIONS=$(jq -c --arg p \"$path\"\
        \ '. + [{path: $p}]' <<<\"$DELETIONS\")\ndone < <(git diff --no-renames --name-only\
        \ --diff-filter=D -z \"${PARENT_OID}\" HEAD)\n\n# Create the remote branch\
        \ at the base tip (or reset an orphaned\n# branch from a prior run).\nif gh\
        \ api \"repos/${REPO}/git/refs/heads/${BRANCH_NAME}\" >/dev/null 2>&1; then\n\
        \  echo \"Branch ${BRANCH_NAME} already exists on remote. Force-updating to\
        \ ${PARENT_OID}.\"\n  gh api --method PATCH \"repos/${REPO}/git/refs/heads/${BRANCH_NAME}\"\
        \ \\\n    -f \"sha=${PARENT_OID}\" -F force=true >/dev/null\nelse\n  gh api\
        \ --method POST \"repos/${REPO}/git/refs\" \\\n    -f \"ref=refs/heads/${BRANCH_NAME}\"\
        \ \\\n    -f \"sha=${PARENT_OID}\" >/dev/null\nfi\n\nINPUT=$(jq -nc \\\n \
        \ --arg repo \"${REPO}\" \\\n  --arg branch \"${BRANCH_NAME}\" \\\n  --arg\
        \ expected \"${PARENT_OID}\" \\\n  --arg headline \"${HEADLINE}\" \\\n  --arg\
        \ body \"${BODY}\" \\\n  --argjson additions \"${ADDITIONS}\" \\\n  --argjson\
        \ deletions \"${DELETIONS}\" \\\n  '{\n    branch: {repositoryNameWithOwner:\
        \ $repo, branchName: $branch},\n    expectedHeadOid: $expected,\n    message:\
        \ {headline: $headline, body: $body},\n    fileChanges: {additions: $additions,\
        \ deletions: $deletions}\n  }')\n\njq -n --arg query 'mutation($input: CreateCommitOnBranchInput!)\
        \ { createCommitOnBranch(input: $input) { commit { oid url } } }' \\\n  --argjson\
        \ variables \"{\\\"input\\\": ${INPUT}}\" \\\n  '{query: $query, variables:\
        \ $variables}' \\\n  | gh api graphql --input -\n"
    - name: Create Pull Request
      if: steps.check-changes.outputs.has-changes == 'true'
      id: create-pr
      run: "if [ \"${{ matrix.target-branch }}\" == \"release-v6.0\" ]; then\n  PR_TITLE=\"\
        Backport: chore(provider/gateway): update gateway model settings files v6\"\
        \nelif [ \"${{ matrix.target-branch }}\" == \"release-v5.0\" ]; then\n  PR_TITLE=\"\
        Backport: chore(provider/gateway): update gateway model settings files v5\"\
        \nelse\n  PR_TITLE=\"chore(provider/gateway): update gateway model settings\
        \ files\"\nfi\n\nWORKFLOW_FILE_URL=\"${{ github.server_url }}/${{ github.repository\
        \ }}/blob/main/.github/workflows/update-model-settings.yml\"\nWORKFLOW_RUN_URL=\"\
        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id\
        \ }}\"\n\nPR_BODY=$(cat <<EOF\nAutomated update of the gateway model settings\
        \ files.\n\nRegenerated from the upstream gateway model list by [\\`update-model-settings.yml\\\
        `]($WORKFLOW_FILE_URL) ([this run]($WORKFLOW_RUN_URL)). Merging this PR is\
        \ what surfaces newly-released gateway models as IDE autocomplete suggestions\
        \ when users type a model string with \\`@ai-sdk/gateway\\`.\n\nSee the workflow\
        \ file for details on cadence and scope.\nEOF\n)\n\nPR_URL=$(gh pr create\
        \ \\\n  --title \"$PR_TITLE\" \\\n  --body \"$PR_BODY\" \\\n  --base \"${{\
        \ matrix.target-branch }}\" \\\n  --head \"${{ steps.create-branch.outputs.branch-name\
        \ }}\" \\\n  --reviewer R-Taneja)\n\nPR_NUMBER=$(echo \"$PR_URL\" | grep -oE\
        \ '[0-9]+$')\necho \"pr-url=$PR_URL\" >> \"$GITHUB_OUTPUT\"\necho \"pr-number=$PR_NUMBER\"\
        \ >> \"$GITHUB_OUTPUT\"\necho \"pr-title=$PR_TITLE\" >> \"$GITHUB_OUTPUT\"\
        \necho \"Changes updated, PR: $PR_URL\"\n"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: No changes
      if: steps.check-changes.outputs.has-changes == 'false'
      run: 'echo "No changes. Model settings are already up to date."

        '
  notify:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    needs: update-models
    if: always() && github.repository_owner == 'wdrx70xn'
    steps:
    - name: Check for opened PRs
      id: check-prs
      run: "PR_COUNT=$(gh api repos/vercel/ai/pulls \\\n  --method GET \\\n  -f state=open\
        \ \\\n  -f per_page=100 \\\n  --jq '[.[] | select(.title | contains(\"chore(provider/gateway):\
        \ update gateway model settings files\"))] | length')\necho \"Found $PR_COUNT\
        \ open PRs\"\necho \"pr-count=$PR_COUNT\" >> \"$GITHUB_OUTPUT\"\n"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Send Slack notification
      run: "if [ \"${{ needs.update-models.result }}\" == \"failure\" ]; then\n  curl\
        \ \"$SLACK_PULL_REQUEST_REVIEW_URL\" -X POST -H \"Content-Type: application/json\"\
        \ \\\n    -d \"{\\\"channel_id\\\": \\\"$CHANNEL_ID\\\", \\\"title\\\": \\\
        \"Gateway model settings update failed. Please check the workflow.\\\", \\\
        \"reviewer\\\": \\\"$REVIEWER\\\"}\"\nelif [ \"$PR_COUNT\" -gt 0 ]; then\n\
        \  curl \"$SLACK_PULL_REQUEST_REVIEW_URL\" -X POST -H \"Content-Type: application/json\"\
        \ \\\n    -d \"{\\\"channel_id\\\": \\\"$CHANNEL_ID\\\", \\\"title\\\": \\\
        \"Gateway model settings updated. $PR_COUNT PR(s) opened for review.\\\",\
        \ \\\"reviewer\\\": \\\"$REVIEWER\\\", \\\"url\\\": \\\"$PR_URL\\\"}\"\nelse\n\
        \  curl \"$SLACK_PULL_REQUEST_REVIEW_URL\" -X POST -H \"Content-Type: application/json\"\
        \ \\\n    -d \"{\\\"channel_id\\\": \\\"$CHANNEL_ID\\\", \\\"title\\\": \\\
        \"Gateway model settings update completed. No changes detected.\\\", \\\"\
        reviewer\\\": \\\"$REVIEWER\\\"}\"\nfi\n"
      env:
        SLACK_PULL_REQUEST_REVIEW_URL: ${{ secrets.SLACK_PULL_REQUEST_REVIEW_URL }}
        PR_COUNT: ${{ steps.check-prs.outputs.pr-count }}
        PR_URL: https://github.com/vercel/ai/pulls?q=is%3Apr+chore%28provider%2Fgateway%29%3A+update+gateway+model+settings+files+is%3Aopen
        CHANNEL_ID: C099VQB75TP
        REVIEWER: U074PVAPV4J
