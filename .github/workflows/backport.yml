name: Backport
'on':
  pull_request:
    types:
    - labeled
  push:
    branches:
    - main
    - release-v*
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to backport
        required: true
        type: number
concurrency: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number
  || github.event.inputs.pull_request_number || github.sha }}
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  resolve-pr:
    name: Resolve backport PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.repository_owner == 'wdrx70xn'
    outputs:
      should-backport: ${{ steps.resolve.outputs.should-backport }}
      pr-number: ${{ steps.resolve.outputs.pr-number }}
      pr-title: ${{ steps.resolve.outputs.pr-title }}
      pr-author-login: ${{ steps.resolve.outputs.pr-author-login }}
      pr-author-type: ${{ steps.resolve.outputs.pr-author-type }}
      merged-by-login: ${{ steps.resolve.outputs.merged-by-login }}
      merged-by-type: ${{ steps.resolve.outputs.merged-by-type }}
      merge-commit-sha: ${{ steps.resolve.outputs.merge-commit-sha }}
      base-ref: ${{ steps.resolve.outputs.base-ref }}
    steps:
    - name: Add gh diagnostics
      run: "set -euo pipefail\n\nREAL_GH=\"$(command -v gh)\"\nWRAPPER_DIR=\"$RUNNER_TEMP/gh-diagnostics\"\
        \nmkdir -p \"$WRAPPER_DIR\"\n\ncat > \"$WRAPPER_DIR/gh\" <<EOF\n#!/usr/bin/env\
        \ bash\nREAL_GH=\"${REAL_GH}\"\n\nprintf '+ gh' >&2\nprintf ' %q' \"\\$@\"\
        \ >&2\nprintf '\\n' >&2\n\nstdout_file=\"\\$(mktemp)\"\nstderr_file=\"\\$(mktemp)\"\
        \ntrap 'rm -f \"\\$stdout_file\" \"\\$stderr_file\"' EXIT\n\n\"\\$REAL_GH\"\
        \ \"\\$@\" >\"\\$stdout_file\" 2>\"\\$stderr_file\"\nstatus=\\$?\n\nif [ \"\
        \\$status\" -eq 0 ]; then\n  cat \"\\$stdout_file\"\n  cat \"\\$stderr_file\"\
        \ >&2\nelse\n  echo \"::warning::gh command failed with exit code \\$status\"\
        \ >&2\n  if [ -s \"\\$stderr_file\" ]; then\n    echo \"::group::gh stderr\"\
        \ >&2\n    cat \"\\$stderr_file\" >&2\n    echo \"::endgroup::\" >&2\n  fi\n\
        \  if [ -s \"\\$stdout_file\" ]; then\n    echo \"::group::gh stdout\" >&2\n\
        \    cat \"\\$stdout_file\" >&2\n    echo \"::endgroup::\" >&2\n  fi\n  echo\
        \ \"::group::GitHub Actions context\" >&2\n  echo \"workflow=\\${GITHUB_WORKFLOW:-}\"\
        \ >&2\n  echo \"job=\\${GITHUB_JOB:-}\" >&2\n  echo \"event=\\${GITHUB_EVENT_NAME:-}\"\
        \ >&2\n  echo \"repository=\\${GITHUB_REPOSITORY:-}\" >&2\n  echo \"run_id=\\\
        ${GITHUB_RUN_ID:-}\" >&2\n  echo \"ref=\\${GITHUB_REF:-}\" >&2\n  echo \"\
        sha=\\${GITHUB_SHA:-}\" >&2\n  echo \"event_path=\\${GITHUB_EVENT_PATH:-}\"\
        \ >&2\n  echo \"REPO=\\${REPO:-}\" >&2\n  echo \"PR_NUMBER=\\${PR_NUMBER:-}\"\
        \ >&2\n  echo \"PR_EVENT_NUMBER=\\${PR_EVENT_NUMBER:-}\" >&2\n  echo \"PUSH_REF=\\\
        ${PUSH_REF:-}\" >&2\n  echo \"PUSH_SHA=\\${PUSH_SHA:-}\" >&2\n  echo \"::endgroup::\"\
        \ >&2\n  exit \"\\$status\"\nfi\nEOF\n\nsed -i 's/^          //' \"$WRAPPER_DIR/gh\"\
        \nchmod +x \"$WRAPPER_DIR/gh\"\necho \"$WRAPPER_DIR\" >> \"$GITHUB_PATH\"\n"
    - name: Resolve PR from trusted event
      id: resolve
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        EVENT_NAME: ${{ github.event_name }}
        PR_EVENT_NUMBER: ${{ github.event.pull_request.number }}
        DISPATCH_PR_NUMBER: ${{ github.event.inputs.pull_request_number }}
        ISSUE_LABEL: ${{ github.event.label.name }}
        LABELER_LOGIN: ${{ github.event.sender.login }}
        REPO: ${{ github.repository }}
        PUSH_REF: ${{ github.ref_name }}
        PUSH_SHA: ${{ github.sha }}
      run: "set -euo pipefail\n\nset_output() {\n  local name=\"$1\"\n  local value=\"\
        $2\"\n  {\n    echo \"${name}<<EOF\"\n    echo \"${value}\"\n    echo \"EOF\"\
        \n  } >> \"$GITHUB_OUTPUT\"\n}\n\nskip() {\n  echo \"$1\"\n  set_output \"\
        should-backport\" \"false\"\n  exit 0\n}\n\nPR_NUMBER=\"\"\n\nif [ \"$EVENT_NAME\"\
        \ = \"pull_request\" ]; then\n  [ \"$ISSUE_LABEL\" = \"backport\" ] || skip\
        \ \"Ignoring non-backport label: $ISSUE_LABEL\"\n  [ -n \"$PR_EVENT_NUMBER\"\
        \ ] || {\n    echo \"::error::pull_request event did not include pull_request.number\"\
        \n    exit 1\n  }\n  PR_NUMBER=\"$PR_EVENT_NUMBER\"\nelif [ \"$EVENT_NAME\"\
        \ = \"workflow_dispatch\" ]; then\n  [ -n \"$DISPATCH_PR_NUMBER\" ] || {\n\
        \    echo \"::error::workflow_dispatch event did not include pull_request_number\"\
        \n    exit 1\n  }\n  PR_NUMBER=\"$DISPATCH_PR_NUMBER\"\nelif [ \"$EVENT_NAME\"\
        \ = \"push\" ]; then\n  if [ \"$PUSH_SHA\" = \"0000000000000000000000000000000000000000\"\
        \ ]; then\n    skip \"Ignoring branch deletion push for ${PUSH_REF}\"\n  fi\n\
        \n  for SHA in \"$PUSH_SHA\"; do\n    PULLS=$(gh api \\\n      -H \"Accept:\
        \ application/vnd.github+json\" \\\n      \"repos/${REPO}/commits/${SHA}/pulls\"\
        )\n    PR_NUMBER=$(echo \"$PULLS\" | jq -r --arg base \"$PUSH_REF\" \\\n \
        \     '[.[] | select(.base.ref == $base)] | .[0].number // empty')\n\n   \
        \ if [ -n \"$PR_NUMBER\" ]; then\n      break\n    fi\n  done\n\n  [ -n \"\
        $PR_NUMBER\" ] || skip \"No pull request found for pushed commit ${PUSH_SHA}\"\
        \nelse\n  skip \"Unsupported event: $EVENT_NAME\"\nfi\n\nPR=$(gh api \"repos/${REPO}/pulls/${PR_NUMBER}\"\
        )\nMERGED=$(echo \"$PR\" | jq -r '.merged')\n[ \"$MERGED\" = \"true\" ] ||\
        \ skip \"PR #${PR_NUMBER} is not merged\"\n\nHEAD_REPO=$(echo \"$PR\" | jq\
        \ -r '.head.repo.full_name // empty')\nif [ \"$EVENT_NAME\" = \"pull_request\"\
        \ ] && [ \"$HEAD_REPO\" != \"$REPO\" ]; then\n  {\n    echo \"@${LABELER_LOGIN}\
        \ this pull request was opened from a fork and must be backported with a workflow_dispatch\
        \ event.\"\n    echo\n    echo 'Please trigger the Backport workflow manually:'\n\
        \    echo 'https://github.com/vercel/ai/actions/workflows/backport.yml'\n\
        \    echo\n    echo 'From the terminal, run:'\n    echo\n    echo '```sh'\n\
        \    echo \"gh workflow run backport.yml --repo vercel/ai -f pull_request_number=${PR_NUMBER}\"\
        \n    echo '```'\n  } > comment.md\n\n  gh pr comment \"$PR_NUMBER\" --repo\
        \ \"$REPO\" --body-file comment.md\n  skip \"PR #${PR_NUMBER} is from a fork\
        \ and must be backported with workflow_dispatch\"\nfi\n\nBASE_REF=$(echo \"\
        $PR\" | jq -r '.base.ref')\ncase \"$BASE_REF\" in\n  main|release-v*) ;;\n\
        \  *) skip \"PR #${PR_NUMBER} targets unsupported base branch: ${BASE_REF}\"\
        \ ;;\nesac\n\nif [ \"$EVENT_NAME\" = \"push\" ] && [ \"$BASE_REF\" != \"$PUSH_REF\"\
        \ ]; then\n  skip \"PR #${PR_NUMBER} base ${BASE_REF} does not match pushed\
        \ branch ${PUSH_REF}\"\nfi\n\nHAS_BACKPORT_LABEL=$(gh api \"repos/${REPO}/issues/${PR_NUMBER}/labels\"\
        \ \\\n  --jq 'any(.[]; .name == \"backport\")')\n[ \"$HAS_BACKPORT_LABEL\"\
        \ = \"true\" ] || skip \"PR #${PR_NUMBER} does not have the backport label\"\
        \n\nset_output \"should-backport\" \"true\"\nset_output \"pr-number\" \"$PR_NUMBER\"\
        \nset_output \"pr-title\" \"$(echo \"$PR\" | jq -r '.title')\"\nset_output\
        \ \"pr-author-login\" \"$(echo \"$PR\" | jq -r '.user.login')\"\nset_output\
        \ \"pr-author-type\" \"$(echo \"$PR\" | jq -r '.user.type')\"\nset_output\
        \ \"merged-by-login\" \"$(echo \"$PR\" | jq -r '.merged_by.login // empty')\"\
        \nset_output \"merged-by-type\" \"$(echo \"$PR\" | jq -r '.merged_by.type\
        \ // empty')\"\nset_output \"merge-commit-sha\" \"$(echo \"$PR\" | jq -r '.merge_commit_sha')\"\
        \nset_output \"base-ref\" \"$BASE_REF\"\n"
  find-branch:
    name: Find target release branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: resolve-pr
    if: 'github.repository_owner == ''wdrx70xn'' &&

      needs.resolve-pr.outputs.should-backport == ''true''

      '
    outputs:
      release-branch: ${{ steps.find-target.outputs.release-branch }}
    steps:
    - name: Checkout Repository
      id: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      continue-on-error: true
      with:
        fetch-depth: 0
    - name: Wait before checkout retry 1
      if: steps.checkout.outcome == 'failure'
      run: sleep 60
    - name: Checkout Repository (retry 1)
      id: checkout-retry-1
      if: steps.checkout.outcome == 'failure'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      continue-on-error: true
      with:
        fetch-depth: 0
    - name: Wait before checkout retry 2
      if: steps.checkout.outcome == 'failure' && steps.checkout-retry-1.outcome ==
        'failure'
      run: sleep 180
    - name: Checkout Repository (retry 2)
      if: steps.checkout.outcome == 'failure' && steps.checkout-retry-1.outcome ==
        'failure'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: Find target release branch
      id: find-target
      run: "# Retry git fetch on transient remote failures (e.g. 5xx from the\n# GitHub\
        \ git server) with linear backoff up to ~5 minutes total.\nATTEMPTS=5\nfor\
        \ attempt in $(seq 1 \"$ATTEMPTS\"); do\n  if git fetch --all; then\n    break\n\
        \  fi\n  if [ \"$attempt\" -eq \"$ATTEMPTS\" ]; then\n    echo \"::error::git\
        \ fetch failed after $ATTEMPTS attempts\"\n    exit 1\n  fi\n  WAIT=$((attempt\
        \ * 30))\n  echo \"Attempt $attempt failed, retrying in ${WAIT}s...\"\n  sleep\
        \ \"$WAIT\"\ndone\n\nBASE_REF=\"${{ needs.resolve-pr.outputs.base-ref }}\"\
        \nRELEASE_BRANCHES=$(git branch -r | grep -E 'origin/release-v[0-9]+\\.[0-9]+$'\
        \ | sed 's/.*origin\\///' | sort -V)\n\nif [ -z \"$RELEASE_BRANCHES\" ]; then\n\
        \  echo \"::error::No release branches found matching pattern release-vX.Y\"\
        \n  exit 1\nfi\n\necho \"Found release branches: $RELEASE_BRANCHES\"\n\nif\
        \ [ \"$BASE_REF\" = \"main\" ]; then\n  TARGET=$(echo \"$RELEASE_BRANCHES\"\
        \ | tail -n 1)\nelse\n  TARGET=$(echo \"$RELEASE_BRANCHES\" | grep -B1 \"\
        ^${BASE_REF}$\" | head -n 1)\n  if [ \"$TARGET\" = \"$BASE_REF\" ] || [ -z\
        \ \"$TARGET\" ]; then\n    echo \"::error::No older release branch found before\
        \ $BASE_REF\"\n    exit 1\n  fi\nfi\n\necho \"Target release branch: $TARGET\"\
        \necho \"release-branch=$TARGET\" >> \"$GITHUB_OUTPUT\"\n"
  backport:
    name: Backport to ${{ needs.find-branch.outputs.release-branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
    - resolve-pr
    - find-branch
    if: 'github.repository_owner == ''wdrx70xn'' &&

      needs.resolve-pr.outputs.should-backport == ''true''

      '
    concurrency:
      group: backport-${{ needs.resolve-pr.outputs.pr-number }}-${{ needs.find-branch.outputs.release-branch
        }}
      cancel-in-progress: false
    steps:
    - name: Configure Git
      run: 'git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git config --global user.name "github-actions[bot]"

        '
    - name: Add gh diagnostics
      run: "set -euo pipefail\n\nREAL_GH=\"$(command -v gh)\"\nWRAPPER_DIR=\"$RUNNER_TEMP/gh-diagnostics\"\
        \nmkdir -p \"$WRAPPER_DIR\"\n\ncat > \"$WRAPPER_DIR/gh\" <<EOF\n#!/usr/bin/env\
        \ bash\nREAL_GH=\"${REAL_GH}\"\n\nprintf '+ gh' >&2\nprintf ' %q' \"\\$@\"\
        \ >&2\nprintf '\\n' >&2\n\nstdout_file=\"\\$(mktemp)\"\nstderr_file=\"\\$(mktemp)\"\
        \ntrap 'rm -f \"\\$stdout_file\" \"\\$stderr_file\"' EXIT\n\n\"\\$REAL_GH\"\
        \ \"\\$@\" >\"\\$stdout_file\" 2>\"\\$stderr_file\"\nstatus=\\$?\n\nif [ \"\
        \\$status\" -eq 0 ]; then\n  cat \"\\$stdout_file\"\n  cat \"\\$stderr_file\"\
        \ >&2\nelse\n  echo \"::warning::gh command failed with exit code \\$status\"\
        \ >&2\n  if [ -s \"\\$stderr_file\" ]; then\n    echo \"::group::gh stderr\"\
        \ >&2\n    cat \"\\$stderr_file\" >&2\n    echo \"::endgroup::\" >&2\n  fi\n\
        \  if [ -s \"\\$stdout_file\" ]; then\n    echo \"::group::gh stdout\" >&2\n\
        \    cat \"\\$stdout_file\" >&2\n    echo \"::endgroup::\" >&2\n  fi\n  echo\
        \ \"::group::GitHub Actions context\" >&2\n  echo \"workflow=\\${GITHUB_WORKFLOW:-}\"\
        \ >&2\n  echo \"job=\\${GITHUB_JOB:-}\" >&2\n  echo \"event=\\${GITHUB_EVENT_NAME:-}\"\
        \ >&2\n  echo \"repository=\\${GITHUB_REPOSITORY:-}\" >&2\n  echo \"run_id=\\\
        ${GITHUB_RUN_ID:-}\" >&2\n  echo \"ref=\\${GITHUB_REF:-}\" >&2\n  echo \"\
        sha=\\${GITHUB_SHA:-}\" >&2\n  echo \"event_path=\\${GITHUB_EVENT_PATH:-}\"\
        \ >&2\n  echo \"REPO=\\${REPO:-}\" >&2\n  echo \"PR_NUMBER=\\${PR_NUMBER:-}\"\
        \ >&2\n  echo \"BACKPORT_BRANCH=\\${BACKPORT_BRANCH:-}\" >&2\n  echo \"BASE_BRANCH=\\\
        ${BASE_BRANCH:-}\" >&2\n  echo \"::endgroup::\" >&2\n  exit \"\\$status\"\n\
        fi\nEOF\n\nsed -i 's/^          //' \"$WRAPPER_DIR/gh\"\nchmod +x \"$WRAPPER_DIR/gh\"\
        \necho \"$WRAPPER_DIR\" >> \"$GITHUB_PATH\"\n"
    - name: Check for existing backport PR
      id: check-existing
      run: "BACKPORT_BRANCH=\"backport-pr-${{ needs.resolve-pr.outputs.pr-number }}-to-${{\
        \ needs.find-branch.outputs.release-branch }}\"\nEXISTING_PR=$(gh api \"repos/${{\
        \ github.repository }}/pulls?head=${{ github.repository_owner }}:${BACKPORT_BRANCH}&state=open\"\
        \ --jq '.[0].html_url // empty')\nif [ -n \"$EXISTING_PR\" ]; then\n  echo\
        \ \"Backport PR already exists: $EXISTING_PR \u2014 skipping.\"\n  echo \"\
        existing-pr=$EXISTING_PR\" >> \"$GITHUB_OUTPUT\"\nfi\n"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Remove backport label (already backported)
      if: steps.check-existing.outputs.existing-pr
      run: 'gh pr edit ${{ needs.resolve-pr.outputs.pr-number }} --remove-label backport
        || true

        '
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Reject PRs that modify workflow files
      if: '!steps.check-existing.outputs.existing-pr'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ needs.resolve-pr.outputs.pr-number }}
        RELEASE_BRANCH: ${{ needs.find-branch.outputs.release-branch }}
      run: "set -euo pipefail\n\nWORKFLOW_FILES=$(gh api --paginate \"repos/${REPO}/pulls/${PR_NUMBER}/files\"\
        \ \\\n  --jq '[.[] | select(.filename | startswith(\".github/workflows/\"\
        )) | .filename] | join(\", \")')\n\nif [ -z \"$WORKFLOW_FILES\" ]; then\n\
        \  exit 0\nfi\n\necho \"::error::PR #${PR_NUMBER} modifies workflow files\
        \ (${WORKFLOW_FILES}) and cannot be backported automatically. GITHUB_TOKEN\
        \ lacks the 'workflows' permission required to commit changes under .github/workflows/,\
        \ and that permission cannot be granted to the default workflow token. Backport\
        \ this change manually.\"\n\ngh pr comment \"$PR_NUMBER\" --body \"\u274C\
        \ Backport to \\`${RELEASE_BRANCH}\\` skipped: this PR modifies workflow files\
        \ under \\`.github/workflows/\\` (\\`${WORKFLOW_FILES}\\`), which cannot be\
        \ backported automatically. \\`GITHUB_TOKEN\\` lacks the \\`workflows\\` permission\
        \ required to commit changes to those paths, and that permission cannot be\
        \ granted to the default workflow token. Please backport this change manually.\"\
        \ \\\n  || echo \"::warning::Failed to comment on PR #${PR_NUMBER} (non-fatal)\"\
        \n\ngh pr edit \"$PR_NUMBER\" --remove-label backport \\\n  || echo \"::warning::Failed\
        \ to remove backport label from PR #${PR_NUMBER} (non-fatal)\"\n\nexit 1\n"
    - name: Checkout Repository
      if: '!steps.check-existing.outputs.existing-pr'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        ref: ${{ needs.find-branch.outputs.release-branch }}
    - name: Create backport branch
      if: '!steps.check-existing.outputs.existing-pr'
      run: '# Create a new branch from the latest release branch for the backport

        git checkout -b backport-pr-${{ needs.resolve-pr.outputs.pr-number }}-to-${{
        needs.find-branch.outputs.release-branch }} origin/${{ needs.find-branch.outputs.release-branch
        }}

        '
    - name: Cherry-pick commits
      if: '!steps.check-existing.outputs.existing-pr'
      id: cherry-pick
      run: "# Get the merge commit hash\nMERGE_COMMIT=\"${{ needs.resolve-pr.outputs.merge-commit-sha\
        \ }}\"\n\n# Cherry-pick the merge commit and capture output\nCHERRY_PICK_OUTPUT=$(git\
        \ cherry-pick -m 1 \"$MERGE_COMMIT\" 2>&1) || CHERRY_PICK_EXIT_CODE=$?\necho\
        \ \"$CHERRY_PICK_OUTPUT\"\necho \"git-output<<EOF\" >> \"$GITHUB_OUTPUT\"\n\
        echo \"$CHERRY_PICK_OUTPUT\" >> \"$GITHUB_OUTPUT\"\necho \"EOF\" >> \"$GITHUB_OUTPUT\"\
        \n\nif [ \"${CHERRY_PICK_EXIT_CODE:-0}\" -ne 0 ]; then\n  echo \"Cherry-pick\
        \ failed. This backport requires manual intervention.\"\n  echo \"::error::Failed\
        \ to cherry-pick merge commit $MERGE_COMMIT to ${{ needs.find-branch.outputs.release-branch\
        \ }} branch\"\n  echo \"has-conflicts=true\" >> \"$GITHUB_OUTPUT\"\nelse\n\
        \  echo \"has-conflicts=false\" >> \"$GITHUB_OUTPUT\"\nfi\n"
    - name: Remap example paths for release-v5.0
      if: '!steps.check-existing.outputs.existing-pr && needs.find-branch.outputs.release-branch
        == ''release-v5.0'' && steps.cherry-pick.outputs.has-conflicts == ''false'''
      run: "# On release-v5.0, examples are in examples/ai-core/ but on main they\
        \ are in examples/ai-functions/\n# If the cherry-pick created examples/ai-functions/,\
        \ move the files to examples/ai-core/\nif [ -d \"examples/ai-functions\" ];\
        \ then\n  echo \"Found examples/ai-functions directory, remapping to examples/ai-core...\"\
        \n  \n  # Move all files from ai-functions to ai-core using git mv\n  for\
        \ file in $(find examples/ai-functions -type f); do\n    target=\"${file/examples\\\
        /ai-functions/examples/ai-core}\"\n    mkdir -p \"$(dirname \"$target\")\"\
        \n    git mv \"$file\" \"$target\"\n  done\n  \n  # Remove the now-empty ai-functions\
        \ directory\n  rm -rf examples/ai-functions\n  \n  # Amend the cherry-pick\
        \ commit with the corrected paths\n  git add .\n  git commit --amend --no-edit\n\
        \  \n  echo \"Successfully remapped example paths from examples/ai-functions/\
        \ to examples/ai-core/\"\nelse\n  echo \"No examples/ai-functions directory\
        \ found, skipping remap\"\nfi\n"
    - name: Commit changes in case of errors
      if: '!steps.check-existing.outputs.existing-pr && steps.cherry-pick.outputs.has-conflicts
        == ''true'''
      run: '# In case of failure, commit the conflicts to allow inspection

        git add .

        git commit -m "Backport conflicts for PR #${{ needs.resolve-pr.outputs.pr-number
        }} to ${{ needs.find-branch.outputs.release-branch }}"

        '
    - name: Push backport branch as signed commit
      if: '!steps.check-existing.outputs.existing-pr'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
        BASE_BRANCH: ${{ needs.find-branch.outputs.release-branch }}
        BACKPORT_BRANCH: backport-pr-${{ needs.resolve-pr.outputs.pr-number }}-to-${{
          needs.find-branch.outputs.release-branch }}
      run: "# Commits made via the GitHub API with GITHUB_TOKEN are signed by\n# GitHub\
        \ automatically. We build the file additions/deletions from\n# the local cherry-pick\
        \ result (vs. the base branch tip) and post\n# them as a single signed commit\
        \ via the GraphQL\n# createCommitOnBranch mutation.\n#\n# File contents and\
        \ the assembled JSON payload are kept on disk\n# and fed to jq via --rawfile\
        \ / --slurpfile so they never land on\n# argv \u2014 passing them as command-line\
        \ arguments hits the kernel\n# ARG_MAX limit on larger backports and fails\
        \ with \"Argument list\n# too long\".\nset -euo pipefail\n\nPARENT_OID=$(git\
        \ rev-parse \"origin/${BASE_BRANCH}\")\nHEADLINE=$(git log -1 --format=%s\
        \ HEAD)\n\nWORK=\"$(mktemp -d)\"\nADDITIONS=\"${WORK}/additions.json\"\nDELETIONS=\"\
        ${WORK}/deletions.json\"\nBODY_FILE=\"${WORK}/body.txt\"\nPAYLOAD=\"${WORK}/payload.json\"\
        \n\ngit log -1 --format=%b HEAD > \"$BODY_FILE\"\necho '[]' > \"$ADDITIONS\"\
        \necho '[]' > \"$DELETIONS\"\n\n# Collect added/modified files (rename-aware\
        \ diff is decomposed\n# into delete+add via --no-renames so each path is independent).\n\
        while IFS= read -r -d '' path; do\n  [ -z \"$path\" ] && continue\n  b64=\"\
        ${WORK}/b64\"\n  base64 -w0 < \"$path\" | tr -d '\\n' > \"$b64\"\n  jq -c\
        \ --arg p \"$path\" --rawfile c \"$b64\" \\\n    '. + [{path: $p, contents:\
        \ $c}]' \\\n    \"$ADDITIONS\" > \"${ADDITIONS}.tmp\"\n  mv \"${ADDITIONS}.tmp\"\
        \ \"$ADDITIONS\"\ndone < <(git diff --no-renames --name-only --diff-filter=AM\
        \ -z \"${PARENT_OID}\" HEAD)\n\nwhile IFS= read -r -d '' path; do\n  [ -z\
        \ \"$path\" ] && continue\n  jq -c --arg p \"$path\" '. + [{path: $p}]' \"\
        $DELETIONS\" > \"${DELETIONS}.tmp\"\n  mv \"${DELETIONS}.tmp\" \"$DELETIONS\"\
        \ndone < <(git diff --no-renames --name-only --diff-filter=D -z \"${PARENT_OID}\"\
        \ HEAD)\n\n# Reset the remote branch to the base branch tip (or create it\n\
        # fresh). This is the \"branch already exists, force-push\" path\n# from before,\
        \ expressed via the refs API.\nif gh api \"repos/${REPO}/git/refs/heads/${BACKPORT_BRANCH}\"\
        \ >/dev/null 2>&1; then\n  echo \"Branch ${BACKPORT_BRANCH} already exists\
        \ on remote (orphaned from a previous run). Force-updating to ${PARENT_OID}.\"\
        \n  gh api --method PATCH \"repos/${REPO}/git/refs/heads/${BACKPORT_BRANCH}\"\
        \ \\\n    -f \"sha=${PARENT_OID}\" -F force=true >/dev/null\nelse\n  gh api\
        \ --method POST \"repos/${REPO}/git/refs\" \\\n    -f \"ref=refs/heads/${BACKPORT_BRANCH}\"\
        \ \\\n    -f \"sha=${PARENT_OID}\" >/dev/null\nfi\n\njq -n \\\n  --arg query\
        \ 'mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input:\
        \ $input) { commit { oid url } } }' \\\n  --arg repo \"${REPO}\" \\\n  --arg\
        \ branch \"${BACKPORT_BRANCH}\" \\\n  --arg expected \"${PARENT_OID}\" \\\n\
        \  --arg headline \"${HEADLINE}\" \\\n  --rawfile body \"$BODY_FILE\" \\\n\
        \  --slurpfile additions \"$ADDITIONS\" \\\n  --slurpfile deletions \"$DELETIONS\"\
        \ \\\n  '{\n    query: $query,\n    variables: {\n      input: {\n       \
        \ branch: {repositoryNameWithOwner: $repo, branchName: $branch},\n       \
        \ expectedHeadOid: $expected,\n        message: {headline: $headline, body:\
        \ ($body | rtrimstr(\"\\n\"))},\n        fileChanges: {additions: $additions[0],\
        \ deletions: $deletions[0]}\n      }\n    }\n  }' > \"$PAYLOAD\"\n\ngh api\
        \ graphql --input \"$PAYLOAD\"\n"
    - name: Determine PR assignee
      if: '!steps.check-existing.outputs.existing-pr'
      id: assignee
      run: "if [ \"$MERGED_BY_TYPE\" = \"User\" ]; then\n  echo \"login=$MERGED_BY_LOGIN\"\
        \ >> \"$GITHUB_OUTPUT\"\nelif [ \"$PR_AUTHOR_TYPE\" = \"User\" ]; then\n \
        \ echo \"login=$PR_AUTHOR_LOGIN\" >> \"$GITHUB_OUTPUT\"\nelse\n  REVIEWER=$(gh\
        \ api \"repos/${{ github.repository }}/pulls/${{ needs.resolve-pr.outputs.pr-number\
        \ }}/reviews\" \\\n    --jq '[.[] | select(.user.type == \"User\")] | last\
        \ | .user.login // empty')\n  if [ -n \"$REVIEWER\" ]; then\n    echo \"login=$REVIEWER\"\
        \ >> \"$GITHUB_OUTPUT\"\n  fi\nfi\n"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        MERGED_BY_TYPE: ${{ needs.resolve-pr.outputs.merged-by-type }}
        MERGED_BY_LOGIN: ${{ needs.resolve-pr.outputs.merged-by-login }}
        PR_AUTHOR_TYPE: ${{ needs.resolve-pr.outputs.pr-author-type }}
        PR_AUTHOR_LOGIN: ${{ needs.resolve-pr.outputs.pr-author-login }}
    - name: Create backport pull request
      if: '!steps.check-existing.outputs.existing-pr'
      id: create-pr
      run: "ASSIGNEE_FLAG=\"\"\nif [ -n \"$ASSIGNEE_LOGIN\" ]; then\n  ASSIGNEE_FLAG=\"\
        --assignee $ASSIGNEE_LOGIN\"\nfi\n\n# Create the backport PR\nif [ \"${{ steps.cherry-pick.outputs.has-conflicts\
        \ }}\" = \"true\" ]; then\n  PR_URL=$(gh pr create \\\n    --title \"$PR_TITLE\"\
        \ \\\n    --body \"$PR_BODY_CONFLICTS\" \\\n    --base ${{ needs.find-branch.outputs.release-branch\
        \ }} \\\n    --head backport-pr-${{ needs.resolve-pr.outputs.pr-number }}-to-${{\
        \ needs.find-branch.outputs.release-branch }} \\\n    $ASSIGNEE_FLAG \\\n\
        \    --draft)\nelse\n  PR_URL=$(gh pr create \\\n    --title \"$PR_TITLE\"\
        \ \\\n    --body \"$PR_BODY_NO_CONFLICTS\" \\\n    --base ${{ needs.find-branch.outputs.release-branch\
        \ }} \\\n    --head backport-pr-${{ needs.resolve-pr.outputs.pr-number }}-to-${{\
        \ needs.find-branch.outputs.release-branch }} \\\n    $ASSIGNEE_FLAG)\nfi\n\
        echo \"backport-pr-url=$PR_URL\" >> \"$GITHUB_OUTPUT\"\ngh pr merge \"$PR_URL\"\
        \ --auto --squash || echo \"Auto-merge could not be enabled\"\necho \"Created\
        \ backport PR $PR_URL\"\n"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ASSIGNEE_LOGIN: ${{ steps.assignee.outputs.login }}
        PR_TITLE: 'Backport: ${{ needs.resolve-pr.outputs.pr-title }}'
        PR_BODY_NO_CONFLICTS: 'This is an automated backport of #${{ needs.resolve-pr.outputs.pr-number
          }} to the ${{ needs.find-branch.outputs.release-branch }} branch. FYI @${{
          needs.resolve-pr.outputs.pr-author-login }}'
        PR_BODY_CONFLICTS: '

          This is an automated backport of #${{ needs.resolve-pr.outputs.pr-number
          }} to the ${{ needs.find-branch.outputs.release-branch }} branch. FYI @${{
          needs.resolve-pr.outputs.pr-author-login }}

          This backport has conflicts that need to be resolved manually.


          ### `git cherry-pick` output


          ```

          ${{ steps.cherry-pick.outputs.git-output }}

          ```

          '
    - name: Remove backport label from original PR
      if: '!steps.check-existing.outputs.existing-pr && steps.create-pr.outputs.backport-pr-url'
      run: "# The backport PR has already been created at this point, so a\n# transient\
        \ GitHub API failure here must not fail the job.\ngh pr edit ${{ needs.resolve-pr.outputs.pr-number\
        \ }} --remove-label backport \\\n  || echo \"::warning::Failed to remove backport\
        \ label from PR #${{ needs.resolve-pr.outputs.pr-number }} (non-fatal)\"\n"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Success Comment on original PR
      if: '!steps.check-existing.outputs.existing-pr && steps.cherry-pick.outputs.has-conflicts
        == ''false'' && steps.create-pr.outputs.backport-pr-url'
      run: "gh pr comment ${{ needs.resolve-pr.outputs.pr-number }} --body \"\u2705\
        \ Backport PR created: ${{ steps.create-pr.outputs.backport-pr-url }}\"\n"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Error Comment on original PR
      if: '!steps.check-existing.outputs.existing-pr && steps.cherry-pick.outputs.has-conflicts
        == ''true'' && steps.create-pr.outputs.backport-pr-url'
      run: "gh pr comment ${{ needs.resolve-pr.outputs.pr-number }} --body \"\u26A0\
        \uFE0F Backport to ${{ needs.find-branch.outputs.release-branch }} created\
        \ but has conflicts: ${{ steps.create-pr.outputs.backport-pr-url }}\"\n"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Pull request failure Comment on original PR
      if: '!steps.check-existing.outputs.existing-pr && steps.cherry-pick.outputs.has-conflicts
        == ''true'' && !steps.create-pr.outputs.backport-pr-url'
      run: "gh pr comment ${{ needs.resolve-pr.outputs.pr-number }} --body \"\u274C\
        \ Backport to ${{ needs.find-branch.outputs.release-branch }} failed. This\
        \ backport requires manual intervention. [View workflow run](${{ github.server_url\
        \ }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"\n"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
